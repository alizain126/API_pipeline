name: Daily Exchange Rate Fetch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas sqlalchemy

      - name: Run pipeline
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python src/pipeline.py

      - name: Save CSV to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/latest_rates.csv
          git commit -m "Auto update: exchange rates $(date +'%Y-%m-%d')" || echo "No changes"
          git push